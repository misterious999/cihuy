<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Server • ZeroixDark</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0b0f1a; --surface:#121a2e; --accent:#00f0ff; --text:#f1f5f9; --text-muted:#94a3b8; --border:#1e2a4a; }
        body { margin:0; font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); }
        .container { max-width:1400px; margin:0 auto; padding:24px; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:24px; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:14px 16px; text-align:left; border-bottom:1px solid var(--border); }
        th { color:var(--text-muted); font-size:12px; text-transform:uppercase; }
        .btn { padding:8px 16px; background:var(--accent); color:#0b0f1a; border:none; border-radius:10px; font-weight:600; cursor:pointer; }
        .status { padding:4px 12px; border-radius:999px; font-size:12px; font-weight:600; }
        .status-running { background:rgba(16,185,129,.15); color:#10b981; }
        .status-offline { background:rgba(239,68,68,.15); color:#ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
            <h1>Kelola Server</h1>
            <button class="btn" onclick="refreshServers()">Muat Ulang Status</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Server Name</th>
                        <th>User</th>
                        <th>Status</th>
                        <th>Node</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="serverTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        let servers = [
            { id:1, name:"Minecraft Survival", user:"nuk", status:"running", node:"Node-01" },
            { id:2, name:"Valheim Server", user:"reseller01", status:"offline", node:"Node-02" },
            { id:3, name:"Rust Wipe", user:"partner_v2", status:"running", node:"Node-01" },
        ];

        function renderServers() {
            const tbody = document.getElementById('serverTable');
            tbody.innerHTML = '';

            servers.forEach(s => {
                const row = document.createElement('tr');
                const statusClass = s.status === 'running' ? 'status-running' : 'status-offline';
                row.innerHTML = `
                    <td><strong>${s.name}</strong></td>
                    <td>${s.user}</td>
                    <td><span class="status ${statusClass}">${s.status}</span></td>
                    <td>${s.node}</td>
                    <td>
                        <button class="btn" style="background:#ef4444; color:white; padding:6px 12px;" onclick="deleteServer(${s.id})">Hapus</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function refreshServers() {
            alert("Status server dimuat ulang (simulasi).");
            renderServers();
        }

        function deleteServer(id) {
            if (confirm("Hapus server ini?")) {
                servers = servers.filter(s => s.id !== id);
                renderServers();
            }
        }

        renderServers();
    </script>
</body>
</html>
