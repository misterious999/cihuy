<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pengguna • ZeroixDark</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a; --surface: #121a2e; --accent: #00f0ff;
            --text: #f1f5f9; --text-muted: #94a3b8; --border: #1e2a4a;
        }
        body { margin:0; font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); }
        .container { max-width:1400px; margin:0 auto; padding:24px; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:24px; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:14px 16px; text-align:left; border-bottom:1px solid var(--border); }
        th { color:var(--text-muted); font-size:12px; text-transform:uppercase; }
        .btn { padding:8px 16px; background:var(--accent); color:#0b0f1a; border:none; border-radius:10px; font-weight:600; cursor:pointer; }
        .badge { font-size:11px; padding:2px 10px; border-radius:999px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Kelola Pengguna</h1>
            <button class="btn" onclick="refreshData()">Muat Ulang</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Server</th>
                        <th>Expired</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="userTable">
                    <!-- Data akan diisi oleh JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Data dummy (nanti dihubungkan ke Firebase + Pterodactyl API)
        let users = [
            { username: "nuk", role: "reseller_private", servers: 12, expired: "2026-08-15", status: "Aktif" },
            { username: "reseller01", role: "reseller_public", servers: 8, expired: "2026-07-20", status: "Aktif" },
            { username: "partner_v2", role: "partner_public_v2", servers: 25, expired: "2026-09-01", status: "Aktif" },
        ];

        function renderUsers() {
            const tbody = document.getElementById('userTable');
            tbody.innerHTML = '';

            users.forEach(user => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${user.username}</strong></td>
                    <td><span class="badge" style="background:rgba(0,240,255,0.15); color:#00f0ff;">${user.role}</span></td>
                    <td>${user.servers} server</td>
                    <td>${user.expired}</td>
                    <td><span style="color:#10b981;">${user.status}</span></td>
                    <td>
                        <button class="btn" style="background:#ef4444; color:white; padding:6px 12px;" onclick="deleteUser('${user.username}')">Hapus</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function refreshData() {
            alert("Data dimuat ulang (simulasi). Di versi asli akan fetch dari API.");
            renderUsers();
        }

        function deleteUser(username) {
            if (confirm(`Hapus user ${username}?`)) {
                users = users.filter(u => u.username !== username);
                renderUsers();
            }
        }

        // Init
        renderUsers();
    </script>
</body>
</html>
